<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Basic</h3>
                <h4 class="text-primary">
                    ₹499/month
                </h4>
                <p>5 Projects</p>
                <p>Email Support</p>
                <button class="btn btn-primary">
                    Choose Plan
                </button>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Standard</h3>
                <h4 class="text-success">
                    ₹999/month
                </h4>
                <p>20 Projects</p>
                <p>Priority Support</p>
                <button class="btn btn-success">
                    Choose Plan
                </button>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Premium</h3>
                <h4 class="text-danger">
                    ₹1499/month
                </h4>
                <p>Unlimited Projects</p>
                <p>24/7 Support</p>
                <button class="btn btn-danger">
                    Choose Plan
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
