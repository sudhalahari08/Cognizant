<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary">Bootstrap Folder structure</h1>
        <div class="card mt-4">
            <div class="card-body">
                <h3>CSS Folder</h3>
                <p>
                    Contains Bootstrap styles for layouts, forms,
                    buttons, typography, cards, etc.
                </p>
                <h3> JS Folder</h3>
                <p>
                    Contains JavaScript plugins such as Modal,
                    Accordion, Dropdown, Carousel and Collapse.
                </p>
                <h3>Icons</h3>
                <p>
                    Bootstrap Icons provide scalable vector icons.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
