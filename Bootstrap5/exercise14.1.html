<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Visibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">
        Bootstrap Display Utilities
    </h2>
    <div class="d-none d-md-block bg-primary text-white p-4 mb-3">
        Visible only on Tablet and Desktop
    </div>
    <div class="d-none d-lg-flex bg-success text-white p-4">
        Visible only on Large Screens (Desktop)
    </div>
</div>
</body>
</html>
