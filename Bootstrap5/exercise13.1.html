<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Colors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Dashboard
    </h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="bg-primary text-white p-4 rounded">
                <h4>Total Users</h4>
                <h2>500</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="bg-warning p-4 rounded">
                <h4>Pending Orders</h4>
                <h2>75</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="bg-success text-white p-4 rounded">
                <h4>Revenue</h4>
                <h2>₹50,000</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
